[[proxies]]
name = "starlight-vnc"
type = "tcp"
# host.docker.internal НЕ подходит для VNC: Docker Desktop на Windows реализует
# host.docker.internal через локальный прокси, соединение приходит на tvnserver
# с адреса 127.0.0.1 → TightVNC блокирует его как "loopback connection".
# LAN IP хоста (192.168.1.99) — обычное сетевое соединение, loopback-проверка не срабатывает.
localIP = "192.168.1.99"
localPort = 5900
remotePort = 5900

[[proxies]]
name = "starlight-ollama"
type = "tcp"
localIP = "host.docker.internal"
localPort = 11434
remotePort = 11434
