name: agghhh.click

# Запуск:     docker compose up -d
# Обновление: docker compose pull && docker compose up -d

# Сертификаты монтируются в каждый контейнер из папки, заданной переменной CERT_DIR.
# Задать в .env (см. .env.example). По умолчанию: /root/cert
#   Linux/VPS : CERT_DIR=/root/cert
# Ожидаемые файлы:
#   agghhh.click_fullchain.crt
#   agghhh.click_privatekey.key

services:

  # ---------------------------------------------------------------------------
  # 3x-ui — панель управления Xray
  # Панель:  http://agghhh.click:2077/vaduha.name777/panel/settings
  # Актуальные теги: https://github.com/MHSanaei/3x-ui/releases
  # ---------------------------------------------------------------------------
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    restart: unless-stopped
    tty: true
    volumes:
      - ${X_UI_DATA:-./3x-ui/db}:/etc/x-ui
      - ${CERT_DIR:-/root/cert}:/root/cert:ro
    ports:
      - "${X_UI_PORT_443:-443}:443"
      - "${X_UI_PORT_40404:-40404}:40404"
      - "2077:2077"
    environment:
      - XRAY_VMESS_AEAD_FORCED=false

  # ---------------------------------------------------------------------------
  # telemt — Telegram MTProto Proxy v3.3.28
  # Собирается из Dockerfile (скачивает бинарь с github.com/telemt/telemt).
  # Клиенты подключаются на порт 8443.
  # Upstream: vkosarev.name:8443 (цепочка через основной сервер)
  # Проект: https://github.com/telemt/telemt
  # ---------------------------------------------------------------------------
  telemt:
    build:
      context: ./telemt
      args:
        TELEMT_VERSION: "3.3.28"
    image: telemt:3.3.28
    restart: unless-stopped
    volumes:
      - ${TELEMT_DATA:-./telemt/data}:/etc/telemt
    working_dir: /etc/telemt
    command: ["/etc/telemt/config.toml"]
    ports:
      - "${TELEMT_PORT:-8443}:8443"
      - "${TELEMT_STATS_PORT:-9091}:9091"

  # ---------------------------------------------------------------------------
  # Portainer — веб-интерфейс управления Docker
  # UI:  https://agghhh.click:9443
  # Актуальные теги: https://hub.docker.com/r/portainer/portainer-ce/tags
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.27.9
    restart: always
    ports:
      - "${PORTAINER_PORT:-9443}:9443"
      - "${PORTAINER_AGENT_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PORTAINER_DATA:-./portainer/data}:/data
      - ${CERT_DIR:-/root/cert}:/root/cert:ro
