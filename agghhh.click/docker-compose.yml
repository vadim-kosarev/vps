name: agghhh.click

# Запуск:     docker compose up -d
# Обновление: docker compose pull && docker compose up -d

# Сертификаты монтируются в каждый контейнер из папки, заданной переменной CERT_DIR.
# Задать в .env (см. .env.example). По умолчанию: /root/cert
#   Linux/VPS : CERT_DIR=/root/cert
# Ожидаемые файлы:
#   agghhh.click_fullchain.crt
#   agghhh.click_privatekey.key

services:

  # ---------------------------------------------------------------------------
  # 3x-ui — панель управления Xray
  # Панель:  http://agghhh.click:2077/vaduha.name777/panel/settings
  # Актуальные теги: https://github.com/MHSanaei/3x-ui/releases
  # Проблема и патч для экспортёра: см. .ai/2026.03.29_3x-ui-exporter_patch.md
  # ---------------------------------------------------------------------------
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    restart: unless-stopped
    tty: true
    volumes:
      - ${X_UI_DATA:-./3x-ui/db}:/etc/x-ui
      - ${CERT_DIR:-/root/cert}:/root/cert:ro
#    ports:
#      - "${X_UI_PORT_443:-443}:443"
#      - "${X_UI_PORT_40404:-40404}:40404"
#      - "2077:2077"
    # network_mode: host — контейнер использует сетевой стек хоста напрямую,
    # что позволяет Xray открывать произвольные порты без явного маппинга.
    # При этом секция ports игнорируется.
    network_mode: host
    environment:
      - XRAY_VMESS_AEAD_FORCED=false

  # ---------------------------------------------------------------------------
  # telemt — Telegram MTProto Proxy v3.3.28
  # Собирается из Dockerfile (скачивает бинарь с github.com/telemt/telemt).
  # Клиенты подключаются на порт 8443.
  # Upstream: vkosarev.name:8443 (цепочка через основной сервер)
  # Проект: https://github.com/telemt/telemt
  # ---------------------------------------------------------------------------
  telemt:
    build:
      context: ./telemt
      args:
        TELEMT_VERSION: "3.3.28"
    image: telemt:3.3.28
    restart: unless-stopped
    volumes:
      - ${TELEMT_DATA:-./telemt/data}:/etc/telemt
    working_dir: /etc/telemt
    command: ["/etc/telemt/config.toml"]
    ports:
      - "${TELEMT_PORT:-8443}:8443"
      - "${TELEMT_STATS_PORT:-9091}:9091"

  # ---------------------------------------------------------------------------
  # Prometheus — сбор метрик
  # Актуальные теги: https://github.com/prometheus/prometheus/releases
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest-distroless
    container_name: prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA:-./prometheus/data}:/prometheus
      - ${CERT_DIR:-/root/cert}:/root/cert:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    environment:
      - NODE_NAME=${NODE_NAME}

  # ---------------------------------------------------------------------------
  # Portainer — веб-интерфейс управления Docker
  # UI:  https://agghhh.click:9443
  # Актуальные теги: https://hub.docker.com/r/portainer/portainer-ce/tags
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.27.9
    restart: always
    ports:
      - "${PORTAINER_PORT:-9443}:9443"
      - "${PORTAINER_AGENT_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PORTAINER_DATA:-./portainer/data}:/data
      - ${CERT_DIR:-/root/cert}:/root/cert:ro


  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: unless-stopped
#    ports:
#      - "3211:80"
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://mail.ec-leasing.ru
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=ssl://mail.ec-leasing.ru
      - ROUNDCUBEMAIL_SMTP_PORT=465
      - ROUNDCUBEMAIL_SMTP_USER=vkosarev
      - ROUNDCUBEMAIL_SMTP_PASS=${ROUNDCUBEMAIL_SMTP_PASS}
      - ROUNDCUBEMAIL_USERNAME_DOMAIN=ec-leasing.ru
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload
    volumes:
      - ./roundcube-db:/var/roundcube/db
      - ./roundcube-config:/var/roundcube/config
      - ./roundcube-temp:/tmp/roundcube-temp

  # ---------------------------------------------------------------------------
  # nginx — HTTPS reverse proxy для roundcube
  # Проксирует 443 → roundcube:80, сертификаты из ${CERT_DIR}
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-roundcube
    restart: unless-stopped
    ports:
      - "3210:3210"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${CERT_DIR:-/root/cert}:/root/cert:ro
    depends_on:
      - roundcube
