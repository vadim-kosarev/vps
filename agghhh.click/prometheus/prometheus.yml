global:
  scrape_interval: 15s      # как часто снимать метрики
  evaluation_interval: 15s  # как часто вычислять alert-правила
  external_labels:
    prometheus: "agghhh.click"

scrape_configs:

  - job_name: "node-self"
    static_configs:
      - targets:
          - "host.docker.internal:9100"
        labels:
          instance: "agghhh.click:9100"

  - job_name: "xui"
    static_configs:
      - targets:
          - "host.docker.internal:3001"
        labels:
          instance: "agghhh.click:9100"
          xui_instance: "agghhh.click:3001"

