server {
    listen 3220 ssl;
    server_name agghhh.click;

    ssl_certificate     /root/cert/agghhh.click_fullchain.crt;
    ssl_certificate_key /root/cert/agghhh.click_privatekey.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    location / {
        set $backend "snappymail:8888";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
    }
}
