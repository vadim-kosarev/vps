# Конфигурация для windows_exporter
# Документация: https://github.com/prometheus-community/windows_exporter

collectors:
  # Список коллекторов через запятую (ОБЯЗАТЕЛЬНО одной строкой!)
  enabled: cpu,memory,logical_disk,net,os,system,service,process,tcp,textfile

# Дополнительные настройки коллекторов (примеры)
# collector:
#   service:
#     services-where: "Name='windows_exporter' OR Name='wuauserv'"

# Путь к textfile коллектору (если используешь кастомные метрики)
# textfile:
#   directory: "C:\\monitoring"

# Логирование (по желанию)
log:
  level: info

# Веб-интерфейс (можно поменять порт, если 9182 занят)
web:
  listen-address: ":9182"
 