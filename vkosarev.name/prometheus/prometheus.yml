global:
  scrape_interval: 15s      # как часто снимать метрики
  evaluation_interval: 15s  # как часто вычислять alert-правила

scrape_configs:

  # node_exporter на обоих хостах — порт 9100 открыт публично
  - job_name: "node"
    static_configs:

      - targets: ["vkosarev.name:9100"]
        labels:
          host: "vkosarev.name"

      - targets: ["agghhh.click:9100"]
        labels:
          host: "agghhh.click"

  # 3x-ui метрики — экспортёр в той же Docker-сети, слушает на :3000
  - job_name: "xui"
    static_configs:
      - targets: ["vkosarev.name:3001"]
        labels:
          host: "vkosarev.name"

