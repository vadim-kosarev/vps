# frps — конфиг сервера FRP (Fast Reverse Proxy)
# Документация: https://github.com/fatedier/frp
#
# ВАЖНО: auth.token — секрет, совпадает с frpc на клиентах.
# Лучше вынести в .env и подставлять, но frps не поддерживает env-переменные в toml нативно.
# Текущее решение: конфиг хранится здесь, не коммитить в публичный репо.

bindAddr = "::"
bindPort = 7401

# KCP (UDP) — тот же порт что и TCP
kcpBindPort = 7401

# Прокси слушают только на localhost хоста (т.к. network_mode: host).
# Чтобы открыть конкретный туннельный порт наружу — использовать iptables DNAT (см. ниже).
# proxyBindAddr = "0.0.0.0" открыло бы ВСЕ туннели публично — не делать.
proxyBindAddr = "127.0.0.1"

# Проброс туннельных портов наружу через iptables (выполняется на хосте один раз):
#
#   sysctl -w net.ipv4.conf.all.route_localnet=1          # разрешить DNAT на 127.0.0.1
#   echo "net.ipv4.conf.all.route_localnet=1" >> /etc/sysctl.conf   # сохранить навсегда
#
#   # Шаблон для каждого порта:
#   iptables -t nat -A PREROUTING -p tcp --dport <PORT> -j DNAT --to-destination 127.0.0.1:<PORT>
#   iptables -A FORWARD -p tcp -d 127.0.0.1 --dport <PORT> -j ACCEPT
#   netfilter-persistent save                              # сохранить правила (пакет iptables-persistent)
#
# Текущие проброшенные порты:
#   41404 (TCP+UDP) — luigi-sync (Resilio Sync), TCP добавлен 2026-06-12, UDP добавлен 2026-07-14
#   5900  (TCP)     — starlight-vnc (TightVNC, парольная аутентификация включена), добавлен 2026-07-14

transport.tls.force = false
transport.maxPoolCount = 5

# Dashboard (веб-интерфейс frps)
# http://vkosarev.name:7599
webServer.addr = "0.0.0.0"
webServer.port = 7599
webServer.user = "admin"
webServer.password = "noname564"

# Токен аутентификации для frpc-клиентов
auth.token = "470720451211462921230901855180"

