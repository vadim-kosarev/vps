# ── 4041 — SUBSONIC (FRP-тунель → host:4040) + WebSocket ─────────────────────
# Был ssl, теперь только http (Subsonic плохо работает с https)
server {
    listen 4041;
    listen [::]:4041;
    server_name vkosarev.name;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:4040;

        # ← Ключевые исправления
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_buffering    off;

    }

}

# ── 3021 — Flowise/starlight (FRP-тунель → host:3020) + WebSocket ────────────
# UI: https://vkosarev.name:3021/
# Flowise запущен на starlight:3020, проброшен через frpc → frps (remotePort=3020)
server {
    listen 3021 ssl;
    listen [::]:3021 ssl;
    server_name vkosarev.name;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:3020;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket — Flowise использует socket.io
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }
}

