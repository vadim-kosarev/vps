# ── 5902 — noVNC/starlight (веб-клиент VNC, → novnc-контейнер:6080) ──────────
# UI: https://vkosarev.name:5902/vnc.html
# noVNC-контейнер сам подключается к TightVNC на starlight (host:5900, приходит
# через frps-туннель starlight-vnc); пароль VNC спрашивается внутри веб-клиента.
server {
    listen 5902 ssl;
    listen [::]:5902 ssl;
    server_name vkosarev.name;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:6080;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (noVNC гонит RFB-поток через websockify)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
    }
}

