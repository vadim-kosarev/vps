# ---------------------------------------------------------------------------
# nginx — vkosarev.name
# Порты: 80 (→1443), 1443 (static), 7601 (IMMICH), 3181, 5001 (Frigate+auth),
#        981 (HIKCAM+auth), 4041 (Subsonic), 3021 (Flowise/starlight),
#        11444 (Ollama/starlight), 8766 (Face Search), 8768 (brighsky),
#        5902 (noVNC/starlight)
# network_mode: host → localhost = 127.0.0.1 хоста, где frps слушает тунели.
# Сертификаты монтируются из CERT_DIR → /root/cert (см. docker-compose.yml).
# .htpasswd монтируется из ./nginx/.htpasswd → /etc/nginx/.htpasswd
# ---------------------------------------------------------------------------

# ВАЖНО: Глобальные SSL-настройки (ssl_protocols, ssl_prefer_server_ciphers и др.)
# должны быть заданы в http-блоке основного nginx.conf, а не здесь!

# ── 80 → 1443 HTTPS редирект ────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location /myip {
        return 302 http://$host:88/;
    }

    # SSL-валидация (CheapSSL/Sectigo) — отдаём по HTTP без редиректа
    location /.well-known/pki-validation/ {
        root /etc/nginx/www/vkosarev.name;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host:1443$request_uri;
    }
}

# ── 1443 — статический сайт ─────────────────────────────────────────────────
server {
    listen 1443 ssl;
    listen [::]:1443 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    root /etc/nginx/www/vkosarev.name;
    index index.html index.htm index.nginx-debian.html;
    server_name vkosarev.name;

    # Редирект /myip на http://vkosarev.name:88/ (с https)
    location /myip {
        return 302 http://$host:88/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# ── 7601 — IMMICH (FRP-тунель → host:2283) ──────────────────────────────────
server {
    listen 7601 ssl;
    listen [::]:7601 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        client_max_body_size 0;
        proxy_pass http://localhost:2283;
        proxy_set_header Host $host;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }
}

# ── 3181 — прокси → host:3180 ────────────────────────────────────────────────
server {
    listen 3181 ssl;
    listen [::]:3181 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:3180;
        proxy_set_header Host $host;
    }
}

# ── 5001 — FRIGATE (FRP-тунель → host:5000) + basic auth + WebSocket ─────────
server {
    auth_basic           "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    listen 5001 ssl;
    listen [::]:5001 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }
}

