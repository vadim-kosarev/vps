# ---------------------------------------------------------------------------
# nginx — vkosarev.name
# Порты: 80 (→1443), 1443 (static), 7601 (IMMICH), 3181, 5001 (Frigate+auth),
#        981 (HIKCAM+auth), 4041 (Subsonic)
# network_mode: host → localhost = 127.0.0.1 хоста, где frps слушает тунели.
# Сертификаты монтируются из CERT_DIR → /root/cert (см. docker-compose.yml).
# .htpasswd монтируется из ./nginx/.htpasswd → /etc/nginx/.htpasswd
# ---------------------------------------------------------------------------

# ВАЖНО: Глобальные SSL-настройки (ssl_protocols, ssl_prefer_server_ciphers и др.)
# должны быть заданы в http-блоке основного nginx.conf, а не здесь!

# ── 80 → 1443 HTTPS редирект ────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location /myip {
        return 302 http://$host:88/;
    }

    return 301 https://$host:1443$request_uri;
}

# ── 1443 — статический сайт ─────────────────────────────────────────────────
server {
    listen 1443 ssl;
    listen [::]:1443 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    root /etc/nginx/www/vkosarev.name;
    index index.html index.htm index.nginx-debian.html;
    server_name vkosarev.name;

    # Редирект /myip на http://vkosarev.name:88/ (с https)
    location /myip {
        return 302 http://$host:88/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# ── 7601 — IMMICH (FRP-тунель → host:2283) ──────────────────────────────────
server {
    listen 7601 ssl;
    listen [::]:7601 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:2283;
        proxy_set_header Host $host;
    }
}

# ── 3181 — прокси → host:3180 ────────────────────────────────────────────────
server {
    listen 3181 ssl;
    listen [::]:3181 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:3180;
        proxy_set_header Host $host;
    }
}

# ── 5001 — FRIGATE (FRP-тунель → host:5000) + basic auth + WebSocket ─────────
server {
    auth_basic           "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    listen 5001 ssl;
    listen [::]:5001 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }
}

# ── 981 — HIKCAM (FRP-тунель → host:980) + basic auth + WebSocket ────────────
server {
    auth_basic           "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    listen 981 ssl;
    listen [::]:981 ssl;

    ssl_certificate     /root/cert/vkosarev.name_fullchain.crt;
    ssl_certificate_key /root/cert/vkosarev.name_privatekey.key;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:980;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }
}

# ── 4041 — SUBSONIC (FRP-тунель → host:4040) + WebSocket ─────────────────────
# Был ssl, теперь только http (Subsonic плохо работает с https)
server {
    listen 4041;
    listen [::]:4041;
    server_name vkosarev.name;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:4040;

        # ← Ключевые исправления
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_buffering    off;

    }

}

# ── 3010 — Grafana (FRP-тунель → host:3003) ───────────────────────────────
# UI: http://vkosarev.name:3010/
# Назначение: Альтернативный экземпляр Grafana, проброшенный через frps
# Документация: https://grafana.com/
server {
    listen 3010;
    listen [::]:3010;
    server_name vkosarev.name;

    error_page 502 /502_custom_embedded.html;
    location = /502_custom_embedded.html {
        internal;
        root /etc/nginx/www/;
    }

    location / {
        proxy_pass http://localhost:3003;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }
}
