name: vkosarev.name

# Запуск:     docker compose up -d
# Обновление: docker compose pull && docker compose up -d
# Сертификаты монтируются в каждый контейнер из папки, заданной переменной CERT_DIR.
# Задать в .env (см. .env.example). По умолчанию: /root/cert
#   Linux/VPS : CERT_DIR=/root/cert
#   Windows   : CERT_DIR=Z:\MY\CheapSSL\vkosarev.name
# Ожидаемые файлы:
#   vkosarev.name_fullchain.crt
#   vkosarev.name_privatekey.key

services:
  3x-ui:
    # --------------------------------------------------------------------------------------------------------------------------------------
    # URL:   http://localhost:2055/vkosarev.name.eu/
    # To run httpS - update certificates
    # login: vkosarev
    # --------------------------------------------------------------------------------------------------------------------------------------

    # Актуальные теги: https://github.com/MHSanaei/3x-ui/releases
    image: ghcr.io/mhsanaei/3x-ui:v2.8.11
    container_name: 3x-ui
    restart: unless-stopped
    tty: true

    volumes:
      # SQLite-база данных панели, настройки и конфиги Xray (генерируются панелью)
      - ./3x-ui/db:/etc/x-ui
      # TLS-сертификаты — общая папка с хоста
      - ${CERT_DIR:-/root/cert}:/root/cert:ro

    ports:
      # Веб-панель управления (порт можно сменить в настройках панели)
      - "2055:2055"
      - "10126:10126"
      - "443:443"
      - "8080:8080"
      - "8443:8443"
      - "34819:34819"

    environment:
      # Отключает принудительное использование AEAD для старых клиентов VMess
      - XRAY_VMESS_AEAD_FORCED=false

    # Альтернатива явным портам — host-сеть (проще при множестве inbound):
    network_mode: host

  # ---------------------------------------------------------------------------
  # 3x-ui-exporter — экспортёр метрик Xray/3x-ui для Prometheus
  # Метрики: http://vkosarev.name:3001/metrics
  # Проект:  https://github.com/m4l3vich/3x-ui-prometheus-exporter
  # ---------------------------------------------------------------------------
  3x-ui-exporter:
    image: m4l3vich/3x-ui-prometheus-exporter:latest
    container_name: xui-exporter
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Адрес панели 3x-ui внутри Docker-сети — экспортёр читает XUI_ORIGIN (не XUI_HOST!)
      XUI_ORIGIN:   "${XUI_EXPORTER_ORIGIN:-https://host.docker.internal:2055/vkosarev.name.eu/}"
      XUI_USERNAME: "${XUI_EXPORTER_USERNAME:-vkosarev}"
      XUI_PASSWORD: "${XUI_EXPORTER_PASSWORD:-changeme}"
      # Сертификат выдан на vkosarev.name, не на 3x-ui → отключаем проверку
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    ports:
      - "${XUI_EXPORTER_PORT:-3001}:3000"

  # ---------------------------------------------------------------------------
  # frps — Fast Reverse Proxy server v0.63.0
  # Dashboard: http://vkosarev.name:7599
  # Клиенты подключаются на порт 7401 (TCP + KCP/UDP)
  # network_mode: host — frps слушает напрямую на интерфейсах хоста
  # Актуальные теги: https://github.com/fatedier/frp/releases
  # ---------------------------------------------------------------------------
  frps:
    image: snowdreamtech/frps:0.63.0
    container_name: frps
    restart: always
    network_mode: host
    volumes:
      - ${FRPS_CONFIG:-./frps/frps.toml}:/etc/frp/frps.toml:ro
    command: ["-c", "/etc/frp/frps.toml"]

  # ---------------------------------------------------------------------------
  # Prometheus — сбор метрик
  # Актуальные теги: https://github.com/prometheus/prometheus/releases
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA:-./prometheus/data}:/prometheus
      - ${CERT_DIR:-/root/cert}:/root/cert:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"

  # ---------------------------------------------------------------------------
  # Grafana — дашборды и визуализация
  # Готовый дашборд для node_exporter: https://grafana.com/dashboards/1860
  # Актуальные теги: https://github.com/grafana/grafana/releases
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${GRAFANA_DATA:-./grafana/data}:/var/lib/grafana
      - ${CERT_DIR:-/root/cert}:/root/cert:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # mtproxy — Telegram MTProto Proxy
  # Порт: 2443 (снаружи) → 443 (внутри контейнера)
  # Секрет хранится в named volume mtproxy-data (/data).
  # Ссылку для подключения смотреть в логах: docker compose logs mtproxy
  # Актуальные образы: https://hub.docker.com/r/telegrammessenger/proxy/tags
  # ---------------------------------------------------------------------------
  mtproxy:
    image: telegrammessenger/proxy:latest
    container_name: mtproxy
    restart: unless-stopped
    ports:
      - "2443:443"
    volumes:
      - ${MTPROXY_DATA:-./mtproxy/data}:/data
      - ${CERT_DIR:-/root/cert}:/root/cert:ro

  # ---------------------------------------------------------------------------
  # iperf3 — сервер для замера пропускной способности сети
  # Использование: iperf3 -c vkosarev.name -p 5201
  # ---------------------------------------------------------------------------
  iperf3:
    image: networkstatic/iperf3:latest
    container_name: iperf3
    restart: unless-stopped
    command: ["-s"]
    ports:
      - "5201:5201"
    volumes:
      - ${CERT_DIR:-/root/cert}:/root/cert:ro

  # ---------------------------------------------------------------------------
  # mermaid — локальный редактор диаграмм (без отправки данных наружу)
  # UI: http://vkosarev.name:3200
  # Актуальные теги: https://hub.docker.com/r/johnsinclair73/mermaid-live-editor/tags
  # ---------------------------------------------------------------------------
  mermaid:
    image: johnsinclair73/mermaid-live-editor:9.1.7
    container_name: mermaid
    restart: unless-stopped
    ports:
      - "3200:80"
    volumes:
      - ${CERT_DIR:-/root/cert}:/root/cert:ro

  # ---------------------------------------------------------------------------
  # nginx — обратный прокси и статический сайт
  # Заменяет системный nginx: порты 80, 1443, 7601, 3181, 5001, 981, 4041.
  # Конфиг:  ./nginx/conf.d/vkosarev.name.conf
  # Статика: ./nginx/www/vkosarev.name/
  # htpasswd:./nginx/.htpasswd
  # Бэкенды IMMICH/Frigate/HIKCAM/Subsonic приходят через frps-тунели
  # и доступны на host.docker.internal (host-gateway).
  # Актуальные теги: https://hub.docker.com/_/nginx/tags
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    # host-сеть: nginx видит localhost хоста напрямую →
    # frps-тунели (proxyBindAddr=127.0.0.1) доступны как localhost:XXXX
    network_mode: host
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/www:/etc/nginx/www:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ${CERT_DIR:-/root/cert}:/root/cert:ro

  # ---------------------------------------------------------------------------
  # Portainer — веб-интерфейс управления Docker
  # UI:  https://vkosarev.name:9443
  # API: http://vkosarev.name:8000  (используется агентом Portainer)
  # Актуальные теги: https://hub.docker.com/r/portainer/portainer-ce/tags
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PORTAINER_DATA:-./portainer/data}:/data
      - ${CERT_DIR:-/root/cert}:/root/cert:ro

  # ---------------------------------------------------------------------------
  # myip — сервис для отображения публичного IP-адреса
  # UI: http://vkosarev.name:88
  # Документация: https://hub.docker.com/r/jason5ng32/myip
  # ---------------------------------------------------------------------------
  myip:
    image: jason5ng32/myip:latest
    container_name: myip
    restart: unless-stopped
    ports:
      - "88:18966"  # frontend (основной UI)
      # - "11966:11966"  # backend (если потребуется снаружи)
    environment:
      - ALLOW_ORIGIN=*

volumes: {}
