services:
  3x-ui:
    # URL панели - http://localhost:2055/vkosarev.name.eu/
    # login: vkosarev
    # Актуальные теги: https://github.com/MHSanaei/3x-ui/releases
    image: ghcr.io/mhsanaei/3x-ui:v2.8.11
    container_name: 3x-ui
    restart: unless-stopped
    tty: true

    volumes:
      # SQLite-база данных панели, настройки и конфиги Xray (генерируются панелью)
      - ./3x-ui/db:/etc/x-ui
      # TLS-сертификаты (путь указывается в настройках панели)
      # Положить файлы в ./3x-ui/cert/:
      #   vkosarev.name_fullchain.crt  — полная цепочка сертификата
      #   vkosarev.name.key            — приватный ключ
      - ./3x-ui/cert:/root/cert

    ports:
      # Веб-панель управления (порт можно сменить в настройках панели)
      - "2055:2055"
      # Порты для inbound-подключений клиентов — добавить по мере настройки в панели
      # - "443:443"
      # - "80:80"

    environment:
      # Отключает принудительное использование AEAD для старых клиентов VMess
      - XRAY_VMESS_AEAD_FORCED=false

    # Альтернатива явным портам — host-сеть (проще при множестве inbound):
    # network_mode: host

